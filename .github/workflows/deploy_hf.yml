name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - hf_space

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Git LFS
        run: sudo apt-get install git-lfs

      - name: Configure Git for Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "duongthuan1445@gmail.com"
          git config --global user.name "ThuanNaN"
          git remote add space https://huggingface.co/spaces/thuanan/miniGPT4-finetuned-vivqa
          git remote set-url space https://thuanan:${HF_TOKEN}@huggingface.co/spaces/thuanan/miniGPT4-finetuned-vivqa

      - name: Push Code to Hugging Face
        run: |
          git push --force space main
